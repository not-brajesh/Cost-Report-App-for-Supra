  <style>
    .download-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      color: white;
      padding: 12px 24px;

      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
    }
    .download-btn.hidden {
      display: none;
    }

    /* JAVITRON Particle Background */
    #javitron-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: all;
    }

  <body>
    <canvas id="javitron-canvas"></canvas>
    <div id="root"></div>
    <button id="downloadBtn" class="download-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Download App
    </button>
    <script>
      const downloadBtn = document.getElementById('downloadBtn');
      let deferredPrompt;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        downloadBtn.classList.remove('hidden');
      });

      downloadBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            downloadBtn.classList.add('hidden');
          }
          deferredPrompt = null;
        } else {
          // Fallback for browsers that don't support PWA install prompt
          alert('To download this app for offline use:\n\n1. Tap the Share button in your browser\n2. Tap "Add to Home Screen" or "Install App"\n3. Confirm the installation');
        }
      });

      // Hide button if already installed
      window.addEventListener('appinstalled', () => {
        downloadBtn.classList.add('hidden');
      });
    </script>

    <!-- LocalStorage Form Data Persistence -->
    <script>
    (function() {
      const STORAGE_KEY = 'supra_cost_report_data';
      
      // Save form data to localStorage
      function saveFormData() {
        const formData = {};
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
          if (input.id || input.name) {
            const key = input.id || input.name;
            formData[key] = input.value;
          }
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(formData));
        console.log('Form data saved to localStorage');
      }
      
      // Restore form data from localStorage
      function restoreFormData() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
          const formData = JSON.parse(savedData);
          Object.keys(formData).forEach(key => {
            const input = document.getElementById(key) || document.querySelector(`[name="${key}"]`);
            if (input) {
              input.value = formData[key];
              // Trigger change event for React to recognize the value
              input.dispatchEvent(new Event('input', { bubbles: true }));
              input.dispatchEvent(new Event('change', { bubbles: true }));
            }
          });
          console.log('Form data restored from localStorage');
        }
      }
      
      // Setup event listeners on form inputs
      function setupFormListeners() {
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
          input.addEventListener('input', saveFormData);
          input.addEventListener('change', saveFormData);
        });
        console.log('Form listeners attached:', inputs.length, 'inputs');
      }
      
      // Wait for React app to render, then restore data
      function initPersistence() {
        // Try to restore immediately
        setTimeout(() => {
          restoreFormData();
          setupFormListeners();
        }, 1000);
        
        // Also try after a longer delay (for slower devices)
        setTimeout(() => {
          restoreFormData();
          setupFormListeners();
        }, 3000);
        
        // Watch for new form elements being added
        const observer = new MutationObserver(() => {
          setupFormListeners();
        });
        
        observer.observe(document.body, {
          childList: true,
          subtree: true
        });
      }
      
      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPersistence);
      } else {
        initPersistence();
      }
      
      // Expose clear function globally
      window.clearSavedData = function() {
        localStorage.removeItem(STORAGE_KEY);
        console.log('Saved form data cleared');
      };
    })();
    </script>

    <!-- JAVITRON Particle Text Effect -->
    <script>
    (function() {
      const canvas = document.getElementById('javitron-canvas');
      const ctx = canvas.getContext('2d');
      
      let particles = [];
      let mouse = { x: null, y: null, radius: 40 };
      let animationId;
      
      // Resize canvas
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
      }
      
      // Mouse tracking
      window.addEventListener('mousemove', (e) => {
        mouse.x = e.x;
        mouse.y = e.y;
      });
      
      window.addEventListener('mouseout', () => {
        mouse.x = null;
        mouse.y = null;
      });
      
      // Touch support
      window.addEventListener('touchmove', (e) => {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      });
      
      window.addEventListener('touchend', () => {
        mouse.x = null;
        mouse.y = null;
      });
      
      // Particle class - Triangle particles
      class Particle {
        constructor(x, y) {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.originX = x;
          this.originY = y;
          this.size = Math.random() * 2.5 + 2;
          this.color = `rgba(255, 107, 53, ${Math.random() * 0.1 + 0.9})`;
          this.velocity = { x: 0, y: 0 };
          this.friction = 0.92;
          this.ease = 0.06;
          this.dispersed = false;
          this.rotation = Math.random() * Math.PI * 2;
          this.rotationSpeed = (Math.random() - 0.5) * 0.1;
        }
        
        update() {
          // Calculate distance from mouse - only disperse when cursor is directly on this particle
          if (mouse.x != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // Very tight radius - only disperse when cursor is directly touching the particle
            if (distance < 20) {
              this.dispersed = true;
              const forceDirectionX = dx / distance;
              const forceDirectionY = dy / distance;
              const force = (20 - distance) / 20;
              const directionX = forceDirectionX * force * 30;
              const directionY = forceDirectionY * force * 30;
              
              this.velocity.x -= directionX;
              this.velocity.y -= directionY;
              this.rotation += this.rotationSpeed * 2;
            }
          }
          
          // Strong magnetic pull back to original position
          let dx = this.originX - this.x;
          let dy = this.originY - this.y;
          this.velocity.x += dx * this.ease;
          this.velocity.y += dy * this.ease;
          
          // Reset dispersed flag when particle returns to origin
          if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) {
            this.dispersed = false;
          }
          
          // Apply velocity with friction
          this.velocity.x *= this.friction;
          this.velocity.y *= this.friction;
          this.x += this.velocity.x;
          this.y += this.velocity.y;
          
          // Smooth rotation
          this.rotation += this.rotationSpeed;
        }
        
        drawTriangle() {
          ctx.fillStyle = this.color;
          ctx.beginPath();
          const size = this.size;
          
          // Draw triangle with rotation
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          
          ctx.moveTo(0, -size);
          ctx.lineTo(-size * 0.866, size * 0.5);
          ctx.lineTo(size * 0.866, size * 0.5);
          ctx.closePath();
          
          ctx.fill();
          ctx.restore();
        }
      }
      
      // Initialize particles from text
      function init() {
        particles = [];
        
        // Create offscreen canvas for text analysis
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');
        offCanvas.width = canvas.width;
        offCanvas.height = canvas.height;
        
        // Calculate font size for full screen width - edge to edge
        const fontSize = Math.min(canvas.width / 3.2, 300);
        offCtx.font = `900 ${fontSize}px Arial, sans-serif`;
        offCtx.fillStyle = 'white';
        offCtx.textAlign = 'center';
        offCtx.textBaseline = 'middle';
        
        // Draw text
        const text = 'JAVITRON';
        offCtx.fillText(text, offCanvas.width / 2, offCanvas.height / 2);
        
        // Get pixel data
        const imageData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
        const data = imageData.data;
        
        // Scan pixels and create particles - every pixel for maximum density
        const step = 1;
        for (let y = 0; y < offCanvas.height; y += step) {
          for (let x = 0; x < offCanvas.width; x += step) {
            const index = (y * offCanvas.width + x) * 4;
            const alpha = data[index + 3];
            
            if (alpha > 128) {
              particles.push(new Particle(x, y));
            }
          }
        }
      }
      
      // Animation loop
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Update and draw particles
        for (let i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].drawTriangle();
        }
        
        // Draw connecting lines between nearby particles for mesh effect - smoother
        ctx.beginPath();
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < 8) {
              const opacity = 0.4 * (1 - distance / 8);
              ctx.strokeStyle = `rgba(255, 140, 80, ${opacity})`;
              ctx.lineWidth = 1.5;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
              ctx.beginPath();
            }
          }
        }
        
        animationId = requestAnimationFrame(animate);
      }
      
      // Start
      window.addEventListener('resize', resize);
      resize();
      animate();
    })();
    </script>
  </body>
