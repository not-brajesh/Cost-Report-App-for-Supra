<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="SUPRA SAEINDIA Cost Report Application" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SUPRA Cost" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>SUPRA SAEINDIA Cost Report - Javitron</title>
    <script type="module" crossorigin src="./assets/index-DQ0lPwaa.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C5zfTLSS.css">
  <style>
    .download-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
    }
    .download-btn.hidden {
      display: none;
    }
  </style>
</head>
  <body>
    <div id="root"></div>
    <button id="downloadBtn" class="download-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Download App
    </button>
    <script>
      const downloadBtn = document.getElementById('downloadBtn');
      let deferredPrompt;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        downloadBtn.classList.remove('hidden');
      });

      downloadBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            downloadBtn.classList.add('hidden');
          }
          deferredPrompt = null;
        } else {
          // Fallback for browsers that don't support PWA install prompt
          alert('To download this app for offline use:\n\n1. Tap the Share button in your browser\n2. Tap "Add to Home Screen" or "Install App"\n3. Confirm the installation');
        }
      });

      // Hide button if already installed
      window.addEventListener('appinstalled', () => {
        downloadBtn.classList.add('hidden');
      });
    </script>

    <!-- LocalStorage Form Data Persistence -->
    <script>
    (function() {
      const STORAGE_KEY = 'supra_cost_report_data';
      
      // Save form data to localStorage
      function saveFormData() {
        const formData = {};
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
          if (input.id || input.name) {
            const key = input.id || input.name;
            formData[key] = input.value;
          }
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(formData));
        console.log('Form data saved to localStorage');
      }
      
      // Restore form data from localStorage
      function restoreFormData() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
          const formData = JSON.parse(savedData);
          Object.keys(formData).forEach(key => {
            const input = document.getElementById(key) || document.querySelector(`[name="${key}"]`);
            if (input) {
              input.value = formData[key];
              // Trigger change event for React to recognize the value
              input.dispatchEvent(new Event('input', { bubbles: true }));
              input.dispatchEvent(new Event('change', { bubbles: true }));
            }
          });
          console.log('Form data restored from localStorage');
        }
      }
      
      // Setup event listeners on form inputs
      function setupFormListeners() {
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
          input.addEventListener('input', saveFormData);
          input.addEventListener('change', saveFormData);
        });
        console.log('Form listeners attached:', inputs.length, 'inputs');
      }
      
      // Wait for React app to render, then restore data
      function initPersistence() {
        // Try to restore immediately
        setTimeout(() => {
          restoreFormData();
          setupFormListeners();
        }, 1000);
        
        // Also try after a longer delay (for slower devices)
        setTimeout(() => {
          restoreFormData();
          setupFormListeners();
        }, 3000);
        
        // Watch for new form elements being added
        const observer = new MutationObserver(() => {
          setupFormListeners();
        });
        
        observer.observe(document.body, {
          childList: true,
          subtree: true
        });
      }
      
      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPersistence);
      } else {
        initPersistence();
      }
      
      // Expose clear function globally
      window.clearSavedData = function() {
        localStorage.removeItem(STORAGE_KEY);
        console.log('Saved form data cleared');
      };
    })();
    </script>
  </body>
</html>
