    <script>
      const downloadBtn = document.getElementById('downloadBtn');
      let deferredPrompt;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        downloadBtn.classList.remove('hidden');
      });

      downloadBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            downloadBtn.classList.add('hidden');
          }
          deferredPrompt = null;
        } else {
          // Fallback for browsers that don't support PWA install prompt
          alert('To download this app for offline use:\n\n1. Tap the Share button in your browser\n2. Tap "Add to Home Screen" or "Install App"\n3. Confirm the installation');
        }
      });

      // Hide button if already installed
      window.addEventListener('appinstalled', () => {
        downloadBtn.classList.add('hidden');
      });
    </script>

    <!-- LocalStorage Form Data Persistence -->
    <script>
    (function() {
      const STORAGE_KEY = 'supra_cost_report_data';
      
      // Save form data to localStorage
      function saveFormData() {
        const formData = {};
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
          if (input.id || input.name) {
            const key = input.id || input.name;
            formData[key] = input.value;
          }
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(formData));
        console.log('Form data saved to localStorage');
      }
      
      // Restore form data from localStorage
      function restoreFormData() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
          const formData = JSON.parse(savedData);
          Object.keys(formData).forEach(key => {
            const input = document.getElementById(key) || document.querySelector(`[name="${key}"]`);
            if (input) {
              input.value = formData[key];
              // Trigger change event for React to recognize the value
              input.dispatchEvent(new Event('input', { bubbles: true }));
              input.dispatchEvent(new Event('change', { bubbles: true }));
            }
          });
          console.log('Form data restored from localStorage');
        }
      }
      
      // Setup event listeners on form inputs
      function setupFormListeners() {
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
          input.addEventListener('input', saveFormData);
          input.addEventListener('change', saveFormData);
        });
        console.log('Form listeners attached:', inputs.length, 'inputs');
      }
      
      // Wait for React app to render, then restore data
      function initPersistence() {
        // Try to restore immediately
        setTimeout(() => {
          restoreFormData();
          setupFormListeners();
        }, 1000);
        
        // Also try after a longer delay (for slower devices)
        setTimeout(() => {
          restoreFormData();
          setupFormListeners();
        }, 3000);
        
        // Watch for new form elements being added
        const observer = new MutationObserver(() => {
          setupFormListeners();
        });
        
        observer.observe(document.body, {
          childList: true,
          subtree: true
        });
      }
      
      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPersistence);
      } else {
        initPersistence();
      }
      
      // Expose clear function globally
      window.clearSavedData = function() {
        localStorage.removeItem(STORAGE_KEY);
        console.log('Saved form data cleared');
      };
    })();
    </script>

    <!-- Comma Formatting for Cost Fields -->
    <script>
    (function() {
      // Format number with commas
      function formatWithCommas(value) {
        if (!value) return value;
        // Remove existing commas first
        const numStr = value.toString().replace(/,/g, '');
        // Check if it's a number
        const num = parseFloat(numStr);
        if (isNaN(num)) return value;
        // Format with commas
        return num.toLocaleString('en-IN');
      }

      // Format input value
      function formatInput(input) {
        const cursorPosition = input.selectionStart;
        const originalLength = input.value.length;
        
        const formatted = formatWithCommas(input.value);
        input.value = formatted;
        
        // Restore cursor position
        const newLength = input.value.length;
        const diff = newLength - originalLength;
        input.setSelectionRange(cursorPosition + diff, cursorPosition + diff);
      }

      // Setup comma formatting for cost fields
      function setupCommaFormatting() {
        // Target cost-related inputs
        const costKeywords = ['cost', 'price', 'unit', 'list', 'process', 'amount', 'total'];
        
        const inputs = document.querySelectorAll('input[type="text"], input[type="number"], input');
        inputs.forEach(input => {
          const id = (input.id || '').toLowerCase();
          const name = (input.name || '').toLowerCase();
          const placeholder = (input.placeholder || '').toLowerCase();
          const label = input.labels && input.labels[0] ? input.labels[0].textContent.toLowerCase() : '';
          
          // Check if this is a cost-related field
          const isCostField = costKeywords.some(keyword => 
            id.includes(keyword) || 
            name.includes(keyword) || 
            placeholder.includes(keyword) ||
            label.includes(keyword)
          );
          
          if (isCostField) {
            // Format on input
            input.addEventListener('input', function() {
              formatInput(input);
            });
            
            // Format on blur
            input.addEventListener('blur', function() {
              input.value = formatWithCommas(input.value);
            });
            
            // Initial format
            if (input.value) {
              input.value = formatWithCommas(input.value);
            }
          }
        });
      }

      // Setup on DOM ready and watch for new elements
      function initCommaFormatting() {
        setupCommaFormatting();
        
        // Watch for new inputs being added
        const observer = new MutationObserver(() => {
          setupCommaFormatting();
        });
        
        observer.observe(document.body, {
          childList: true,
          subtree: true
        });
      }

      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initCommaFormatting);
      } else {
        setTimeout(initCommaFormatting, 1000);
      }

      // Global format function
      window.formatNumberWithCommas = formatWithCommas;
    })();
    </script>

      // Calculate material cost based on formula
      calculate: function(materialName, inputs) {
        const material = window.completeMaterialDatabase[materialName];
        if (!material) return null;

        // If fixed price, return it
        if (material.price !== undefined) {
          return {
            cost: material.price,
            unit: material.unit,
            isFormula: false
          };
        }

        // If formula, calculate
        if (material.formula && inputs) {
          try {
            let result;
            const c1 = material.c1 || 0;
            const c2 = material.c2 || 0;
            const size1 = inputs.size1 || 0;
            const size2 = inputs.size2 || 0;

            switch(material.formula) {
              case "c1*size1 + c2":
                result = c1 * size1 + c2;
                break;
              case "c1*size1*size1 + c2":
                result = c1 * size1 * size1 + c2;
                break;
              case "c1*size1*size1*size2 + c2":
                result = c1 * size1 * size1 * size2 + c2;
                break;
              case "c1*size1*size2 + c2":
                result = c1 * size1 * size2 + c2;
                break;
              case "c1*Math.pow(size1*size1*size2, c2)":
                result = c1 * Math.pow(size1 * size1 * size2, c2);
                break;
              default:
                result = c1 * size1 + c2;
            }

            return {
              cost: Math.max(0, result),
              unit: material.unit,
              isFormula: true,
              inputs: inputs
            };
          } catch(e) {
            console.error('Formula calculation error:', e);
            return null;
          }
        }

        return null;
      },

      // Get material info
      getMaterialInfo: function(materialName) {
        return window.completeMaterialDatabase[materialName] || null;
      },

      // Get all materials by category
      getMaterialsByCategory: function(category) {
        const result = {};
        for (const [name, data] of Object.entries(window.completeMaterialDatabase)) {
          if (data.category === category) {
            result[name] = data;
          }
        }
        return result;
      },

      // Get all categories
      getCategories: function() {
        const categories = new Set();
        for (const data of Object.values(window.completeMaterialDatabase)) {
          categories.add(data.category);
        }
        return Array.from(categories).sort();
      }
    };
