  <style>
    .download-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
    }
    .download-btn.hidden {
      display: none;
    }

    /* Phone Responsive - Without changing anything else */
    @media (max-width: 768px) {
      html {
        font-size: 14px;
      }
      #root {
        padding: 10px;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }
      .download-btn {
        padding: 10px 16px;

    @media (max-width: 480px) {

    /* Safe area for notch phones */
    @supports (padding-top: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }

    /* JAVITRON Particle Background */
    #javitron-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: all;
    }

  <body>
    <canvas id="javitron-canvas"></canvas>
    <div id="root"></div>
    <button id="downloadBtn" class="download-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Download App
    </button>
    <script>
      const downloadBtn = document.getElementById('downloadBtn');
      let deferredPrompt;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        downloadBtn.classList.remove('hidden');
      });

      downloadBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            downloadBtn.classList.add('hidden');
          }
          deferredPrompt = null;
        } else {
          // Fallback for browsers that don't support PWA install prompt
          alert('To download this app for offline use:\n\n1. Tap the Share button in your browser\n2. Tap "Add to Home Screen" or "Install App"\n3. Confirm the installation');
        }
      });

      // Hide button if already installed
      window.addEventListener('appinstalled', () => {
        downloadBtn.classList.add('hidden');
      });
    </script>

    <!-- JAVITRON Particle Text Effect -->
    <script>
    (function() {
      const canvas = document.getElementById('javitron-canvas');
      const ctx = canvas.getContext('2d');
      
      let particles = [];
      let mouse = { x: null, y: null, radius: 100 };
      let animationId;
      let textCoordinates = [];
      
      // Resize canvas
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
      }
      
      // Mouse tracking
      window.addEventListener('mousemove', (e) => {
        mouse.x = e.x;
        mouse.y = e.y;
      });
      
      window.addEventListener('mouseout', () => {
        mouse.x = null;
        mouse.y = null;
      });
      
      // Touch support
      window.addEventListener('touchmove', (e) => {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      });
      
      window.addEventListener('touchend', () => {
        mouse.x = null;
        mouse.y = null;
      });
      
      // Particle class
      class Particle {
        constructor(x, y) {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.originX = x;
          this.originY = y;
          this.size = Math.random() * 2 + 1;
          this.color = `rgba(255, 107, 53, ${Math.random() * 0.5 + 0.3})`;
          this.velocity = { x: 0, y: 0 };
          this.force = 0;
          this.angle = 0;
          this.distance = 0;
          this.friction = 0.95;
          this.ease = 0.1;
          this.dispersed = false;
        }
        
        update() {
          // Calculate distance from mouse
          if (mouse.x != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // Disperse effect when mouse near
            if (distance < mouse.radius) {
              this.dispersed = true;
              const forceDirectionX = dx / distance;
              const forceDirectionY = dy / distance;
              const force = (mouse.radius - distance) / mouse.radius;
              const directionX = forceDirectionX * force * 15;
              const directionY = forceDirectionY * force * 15;
              
              this.velocity.x -= directionX;
              this.velocity.y -= directionY;
            }
          }
          
          // Return to original position
          if (!this.dispersed || (mouse.x == null && Math.abs(this.x - this.originX) > 1)) {
            let dx = this.originX - this.x;
            let dy = this.originY - this.y;
            this.velocity.x += dx * this.ease;
            this.velocity.y += dy * this.ease;
            this.dispersed = false;
          }
          
          // Apply velocity with friction
          this.velocity.x *= this.friction;
          this.velocity.y *= this.friction;
          this.x += this.velocity.x;
          this.y += this.velocity.y;
        }
        
        draw() {
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      
      // Initialize particles from text
      function init() {
        particles = [];
        textCoordinates = [];
        
        // Create offscreen canvas for text analysis
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');
        offCanvas.width = canvas.width;
        offCanvas.height = canvas.height;
        
        // Calculate font size based on screen width
        const fontSize = Math.min(canvas.width / 6, 120);
        offCtx.font = `bold ${fontSize}px Arial, sans-serif`;
        offCtx.fillStyle = 'white';
        offCtx.textAlign = 'center';
        offCtx.textBaseline = 'middle';
        
        // Draw text
        const text = 'JAVITRON';
        offCtx.fillText(text, offCanvas.width / 2, offCanvas.height / 2);
        
        // Get pixel data
        const imageData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
        const data = imageData.data;
        
        // Scan pixels and create particles
        const step = 3; // Skip pixels for performance
        for (let y = 0; y < offCanvas.height; y += step) {
          for (let x = 0; x < offCanvas.width; x += step) {
            const index = (y * offCanvas.width + x) * 4;
            const alpha = data[index + 3];
            
            if (alpha > 128) {
              particles.push(new Particle(x, y));
            }
          }
        }
      }
      
      // Animation loop
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw connecting lines between nearby particles
        for (let i = 0; i < particles.length; i++) {
          particles[i].update();
          particles[i].draw();
          
          // Connect nearby particles with lines
          for (let j = i; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < 25) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(255, 107, 53, ${0.1 * (1 - distance / 25)})`;
              ctx.lineWidth = 0.5;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        
        animationId = requestAnimationFrame(animate);
      }
      
      // Start
      window.addEventListener('resize', resize);
      resize();
      animate();
    })();
    </script>
  </body>
</html>
